<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pecan Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        #map { height: 70vh; width: 100%; border-radius: 1rem; border: 2px solid #e5e7eb; }
        th { cursor: pointer; }
        th:hover { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="bg-emerald-800 text-white p-6 shadow-lg">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight cursor-pointer" onclick="showPage('tree-list')">Orchard Database</h1>
            <nav class="flex gap-4 overflow-x-auto pb-2">
                <button onclick="toggleMapView()" id="viewToggle" class="bg-emerald-700 px-4 py-2 rounded-lg text-sm font-bold shrink-0">Map View</button>
                <button onclick="showPage('tree-list')" class="hover:underline shrink-0">Trees</button>
                <button onclick="fetchWorkOrders(); showPage('work-order-list')" class="hover:underline shrink-0">Work Orders</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <section id="tree-list" class="page active">
            <div class="mb-6"><input type="text" id="treeSearch" oninput="filterTrees()" placeholder="Search trees..." class="w-full p-4 rounded-xl border border-gray-300 shadow-sm outline-none focus:ring-2 focus:ring-emerald-500"></div>
            <div id="treeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="map-view" class="page">
            <div id="map" class="shadow-lg"></div>
        </section>

        <section id="work-order-list" class="page">
            <div class="mb-6"><input type="text" id="woSearch" oninput="filterWorkOrders()" placeholder="Filter work orders (Tree, Field, or Task)..." class="w-full p-4 rounded-xl border border-gray-300 shadow-sm outline-none focus:ring-2 focus:ring-orange-500"></div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th onclick="sortWO('tree_id')" class="p-4 text-xs font-bold uppercase text-gray-500">Tree ID</th>
                            <th onclick="sortWO('trees(field_name)')" class="p-4 text-xs font-bold uppercase text-gray-500">Field</th>
                            <th onclick="sortWO('task_type')" class="p-4 text-xs font-bold uppercase text-gray-500">Type</th>
                            <th class="p-4 text-xs font-bold uppercase text-gray-500">Status</th>
                            <th class="p-4 text-xs font-bold uppercase text-gray-500">Photo</th>
                        </tr>
                    </thead>
                    <tbody id="woTableBody"></tbody>
                </table>
            </div>
        </section>

        <section id="wo-detail" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
            <h2 class="text-2xl font-bold mb-2 text-orange-800" id="detail-title"></h2>
            <p class="text-sm text-gray-500 mb-4" id="detail-subtitle"></p>
            <div class="space-y-4">
                <div id="detail-photo-container"></div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h4 class="text-xs font-bold uppercase text-gray-400 mb-1">Notes & Findings</h4>
                    <p id="detail-notes" class="text-gray-700"></p>
                </div>
                <button onclick="showPage('work-order-list')" class="w-full bg-gray-200 py-3 rounded-xl font-bold">Back to List</button>
            </div>
        </section>

        <section id="work-order" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
            <h2 class="text-xl font-bold mb-4 text-orange-800">New Work Order: <span id="work-tree-id"></span></h2>
            <form id="workForm" class="space-y-4">
                <input type="hidden" id="work-id-internal">
                <div>
                    <label class="block text-sm font-medium">Task Type</label>
                    <select id="task-type" class="w-full p-3 border rounded-lg">
                        <option>Pruning</option><option>Fertilizing</option><option>Irrigation Repair</option><option>Pest Control</option><option>Replace Tree</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Attach Photo</label>
                    <input type="file" id="work-photo" accept="image/*" capture="camera" class="w-full p-2 border border-dashed rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium">Instructions / Findings</label>
                    <textarea id="work-notes" required class="w-full p-3 border rounded-lg"></textarea>
                </div>
                <button type="submit" id="woSubmitBtn" class="w-full bg-orange-600 text-white p-4 rounded-xl font-bold hover:bg-orange-700">Submit Work Order</button>
                <button type="button" onclick="showPage('tree-list')" class="w-full text-gray-500 mt-2">Cancel</button>
            </form>
        </section>

        <section id="log-harvest" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
             <h2 class="text-xl font-bold mb-4 text-emerald-800">Log Harvest: <span id="harvest-tree-id"></span></h2>
             <form id="harvestForm" class="space-y-4">
                <input type="hidden" id="harvest-id-internal">
                <input type="number" step="0.01" id="weight_kg" placeholder="Weight (kg)" required class="w-full p-3 border rounded-lg">
                <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold hover:bg-emerald-700">Save Harvest</button>
                <button type="button" onclick="showPage('tree-list')" class="w-full text-gray-500 mt-2">Cancel</button>
             </form>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://etqenbfxzyhpcpudmlqo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0cWVuYmZ4enlocGNwdWRtbHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODI3MDAsImV4cCI6MjA4NzE1ODcwMH0.5MR78dPRGKbshbHmY1CuAFpS4FMtGtY44IROA-O609c';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let orchardData = [], workOrders = [], filteredWO = [], map, markers = [], userMarker;
        let currentSort = { col: 'tree_id', asc: true };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'map-view' && map) setTimeout(() => map.invalidateSize(), 200);
            window.scrollTo(0,0);
        }

        async function fetchTrees() {
            const { data } = await _supabase.from('trees').select('*, tree_yield_stats(avg_yearly_yield_kg)').order('tree_id');
            orchardData = data || [];
            renderTrees(orchardData);
            if (map) updateMapMarkers();
        }

        async function updateTreeLocation(treeId) {
            if (!navigator.geolocation) return alert("Geolocation not supported");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await _supabase.from('trees').update({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }).eq('tree_id', treeId);
                if (!error) { alert(`Location saved for ${treeId}`); fetchTrees(); }
            }, (err) => alert("GPS Error: " + err.message), { enableHighAccuracy: true });
        }

        async function fetchWorkOrders() {
            const { data } = await _supabase.from('work_orders').select('*, trees(field_name)').order('created_at', { ascending: false });
            workOrders = data || [];
            filteredWO = [...workOrders];
            renderWorkOrders();
        }

        function renderWorkOrders() {
            const tbody = document.getElementById('woTableBody');
            tbody.innerHTML = filteredWO.map((wo, index) => `
                <tr onclick="viewWODetail(${index})" class="border-b hover:bg-orange-50 cursor-pointer transition">
                    <td class="p-4 font-bold">${wo.tree_id}</td>
                    <td class="p-4 text-gray-600">${wo.trees?.field_name || '-'}</td>
                    <td class="p-4"><span class="bg-gray-100 px-2 py-1 rounded text-xs">${wo.task_type}</span></td>
                    <td class="p-4 text-xs font-medium ${wo.status === 'Pending' ? 'text-orange-600' : 'text-emerald-600'}">${wo.status}</td>
                    <td class="p-4">
                        ${wo.photo_url ? `<img src="${wo.photo_url}" class="w-8 h-8 object-cover rounded shadow-sm">` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function viewWODetail(index) {
            const wo = filteredWO[index];
            document.getElementById('detail-title').innerText = `${wo.task_type}: ${wo.tree_id}`;
            document.getElementById('detail-subtitle').innerText = `Field: ${wo.trees?.field_name || 'N/A'} | Status: ${wo.status}`;
            document.getElementById('detail-notes').innerText = wo.notes || "No notes provided.";
            document.getElementById('detail-photo-container').innerHTML = wo.photo_url 
                ? `<img src="${wo.photo_url}" class="w-full rounded-xl shadow-md border">` 
                : '<div class="h-32 bg-gray-100 rounded-xl flex items-center justify-center text-gray-400 italic">No photo attached</div>';
            showPage('wo-detail');
        }

        function filterWorkOrders() {
            const term = document.getElementById('woSearch').value.toLowerCase();
            filteredWO = workOrders.filter(wo => 
                wo.tree_id.toLowerCase().includes(term) || 
                (wo.trees?.field_name && wo.trees.field_name.toLowerCase().includes(term)) ||
                wo.task_type.toLowerCase().includes(term)
            );
            renderWorkOrders();
        }

        function sortWO(col) {
            currentSort.asc = (currentSort.col === col) ? !currentSort.asc : true;
            currentSort.col = col;
            filteredWO.sort((a, b) => {
                let valA = col.includes('trees') ? a.trees?.field_name : a[col];
                let valB = col.includes('trees') ? b.trees?.field_name : b[col];
                return currentSort.asc ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
            });
            renderWorkOrders();
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([-27.65, 152.2], 18);
            L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
            
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (!userMarker) userMarker = L.circleMarker([latitude, longitude], { radius: 8, color: 'white', fillColor: '#3b82f6', fillOpacity: 1, weight: 3 }).addTo(map).bindPopup("You");
                else userMarker.setLatLng([latitude, longitude]);
            }, null, { enableHighAccuracy: true });

            updateMapMarkers();
        }

        function updateMapMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = orchardData.filter(t => t.latitude).map(tree => {
                const m = L.marker([tree.latitude, tree.longitude]).addTo(map);
                m.bindPopup(`<b>${tree.tree_id}</b><br>${tree.field_name || ''}<br><button onclick="openWorkOrder('${tree.tree_id}')" class="bg-orange-600 text-white p-1 rounded text-xs mt-2 w-full">Work Order</button>`);
                return m;
            });
        }

        function toggleMapView() {
            const isActive = document.getElementById('map-view').classList.contains('active');
            showPage(isActive ? 'tree-list' : 'map-view');
            document.getElementById('viewToggle').innerText = isActive ? "Map View" : "Grid View";
            if (!isActive) initMap();
        }

        function renderTrees(trees) {
            document.getElementById('treeGrid').innerHTML = trees.map(tree => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <h3 class="text-lg font-bold">${tree.tree_id}</h3>
                    <p class="text-xs text-emerald-600 font-bold uppercase mb-4">${tree.field_name || 'No Field'}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="openHarvest('${tree.tree_id}')" class="bg-emerald-50 text-emerald-700 py-2 rounded-lg text-sm font-bold">Harvest</button>
                        <button onclick="openWorkOrder('${tree.tree_id}')" class="bg-orange-50 text-orange-700 py-2 rounded-lg text-sm font-bold">Work Order</button>
                        <button onclick="updateTreeLocation('${tree.tree_id}')" class="col-span-2 mt-2 bg-emerald-800 text-white py-2 rounded-lg text-xs font-bold">Update GPS Location</button>
                    </div>
                </div>
            `).join('');
        }

        function openHarvest(id) {
            document.getElementById('harvest-tree-id').innerText = id;
            document.getElementById('harvest-id-internal').value = id;
            showPage('log-harvest');
        }

        function openWorkOrder(id) {
            document.getElementById('work-tree-id').innerText = id;
            document.getElementById('work-id-internal').value = id;
            showPage('work-order');
        }

        function filterTrees() {
            const term = document.getElementById('treeSearch').value.toLowerCase();
            renderTrees(orchardData.filter(t => t.tree_id.toLowerCase().includes(term)));
        }

        document.getElementById('workForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('woSubmitBtn');
            btn.disabled = true; btn.innerText = "Processing...";
            const treeId = document.getElementById('work-id-internal').value;
            const photoFile = document.getElementById('work-photo').files[0];
            let photoUrl = null;

            if (photoFile) {
                const fileName = `${treeId}_${Date.now()}.jpg`;
                const { data } = await _supabase.storage.from('work-order-photos').upload(fileName, photoFile);
                if (data) photoUrl = _supabase.storage.from('work-order-photos').getPublicUrl(fileName).data.publicUrl;
            }

            const { error } = await _supabase.from('work_orders').insert([{ 
                tree_id: treeId, task_type: document.getElementById('task-type').value, 
                notes: document.getElementById('work-notes').value, photo_url: photoUrl, status: 'Pending' 
            }]);
            
            btn.disabled = false; btn.innerText = "Submit Work Order";
            if (!error) { alert("Created!"); e.target.reset(); showPage('tree-list'); }
        };

        fetchTrees();
    </script>
</body>
</html>
