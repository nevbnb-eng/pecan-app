<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pecan Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        #map { height: 75vh; width: 100%; border-radius: 1rem; border: 2px solid #e5e7eb; }
        th { cursor: pointer; }
        th:hover { background-color: #f3f4f6; }
        tr.clickable:hover { background-color: #f9fafb; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="bg-emerald-800 text-white p-6 shadow-lg">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight cursor-pointer" onclick="showPage('tree-list')">Orchard Database</h1>
            <nav class="flex gap-4 overflow-x-auto pb-2">
                <button onclick="toggleMapView()" id="viewToggle" class="bg-emerald-700 px-4 py-2 rounded-lg text-sm font-bold shrink-0">Map View</button>
                <button onclick="showPage('tree-list')" class="hover:underline shrink-0">Trees</button>
                <button onclick="fetchWorkOrders(); showPage('work-order-list')" class="hover:underline shrink-0">Work Orders</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <section id="tree-list" class="page active">
            <div class="mb-6">
                <input type="text" id="treeSearch" oninput="filterTrees()" placeholder="Search by ID, Field, or Variety..." class="w-full p-4 rounded-xl border border-gray-300 shadow-sm outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div id="treeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="map-view" class="page">
            <div id="map" class="shadow-lg"></div>
        </section>

        <section id="tree-detail" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
            <h2 class="text-3xl font-bold text-emerald-900" id="td-id"></h2>
            <p class="text-emerald-600 font-bold uppercase tracking-wider" id="td-field"></p>
            
            <div class="my-4 space-y-1">
                <p class="text-gray-600">Variety: <span id="td-variety" class="font-semibold text-gray-900"></span></p>
                <p class="text-gray-600">Age: <span id="td-age" class="font-semibold text-gray-900"></span></p>
            </div>

            <div class="bg-emerald-50 rounded-xl p-4 my-6 border border-emerald-100">
                <h4 class="text-xs font-bold text-emerald-700 uppercase mb-3">Yield Performance</h4>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <p class="text-xs text-emerald-600">Avg. Yield (Lifetime)</p>
                        <p id="avg-yield" class="text-xl font-black text-emerald-900">0.00 kg</p>
                    </div>
                    <div>
                        <p class="text-xs text-emerald-600">Total Harvests</p>
                        <p id="total-count" class="text-xl font-black text-emerald-900">0</p>
                    </div>
                </div>
                <div class="overflow-hidden rounded-lg border border-emerald-200 bg-white">
                    <table class="w-full text-sm">
                        <thead class="bg-emerald-100 text-emerald-800 text-left">
                            <tr>
                                <th class="px-3 py-1">Year</th>
                                <th class="px-3 py-1 text-right">Total (kg)</th>
                            </tr>
                        </thead>
                        <tbody id="yield-history-body" class="divide-y divide-emerald-50">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="openHarvest(document.getElementById('td-id').innerText)" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-md">Log Harvest</button>
                <button onclick="openWorkOrder(document.getElementById('td-id').innerText)" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold shadow-md">New Work Order</button>
                <button onclick="updateTreeLocation(document.getElementById('td-id').innerText)" class="w-full border-2 border-emerald-800 text-emerald-800 py-3 rounded-xl font-bold">Update GPS Location</button>
                <button onclick="showPage('tree-list')" class="w-full text-gray-400 py-2">Back to List</button>
            </div>
        </section>

        <section id="log-harvest" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
             <h2 class="text-xl font-bold mb-4 text-emerald-800">Log Harvest: <span id="harvest-tree-id"></span></h2>
             <form id="harvestForm" class="space-y-4">
                <input type="hidden" id="harvest-id-internal">
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Harvest Date</label>
                    <input type="date" id="harvest_date" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Gross Weight (kg)</label>
                    <input type="number" step="0.01" id="gross_weight" placeholder="Total bucket weight" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Leaf-to-Nut Ratio (0.0 to 1.0)</label>
                    <input type="number" step="0.01" min="0" max="1" id="leaf_ratio" placeholder="e.g. 0.15" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                </div>

                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                    <p class="text-sm text-emerald-800 font-semibold">Live Net Weight Calculation:</p>
                    <p class="text-2xl font-bold text-emerald-900"><span id="net_weight_display">0.00</span> kg</p>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Notes (Optional)</label>
                    <textarea id="harvest-notes" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500" rows="3" placeholder="Condition of nuts, weather, etc..."></textarea>
                </div>

                <button type="submit" id="harvestSubmitBtn" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-emerald-700">Save Harvest</button>
                <button type="button" onclick="showPage('tree-list')" class="w-full text-gray-500 mt-2">Cancel</button>
             </form>
        </section>

        <section id="work-order-list" class="page">
            <div class="mb-6"><input type="text" id="woSearch" oninput="filterWorkOrders()" placeholder="Filter work orders..." class="w-full p-4 rounded-xl border border-gray-300 shadow-sm outline-none focus:ring-2 focus:ring-orange-500"></div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-bold uppercase text-gray-500">Tree ID</th>
                            <th class="p-4 text-xs font-bold uppercase text-gray-500">Type</th>
                            <th class="p-4 text-xs font-bold uppercase text-gray-500">Status</th>
                            <th class="p-4 text-xs font-bold uppercase text-gray-500">Logged</th>
                        </tr>
                    </thead>
                    <tbody id="woTableBody"></tbody>
                </table>
            </div>
        </section>

        <section id="wo-detail" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
            <h2 class="text-2xl font-bold text-orange-900 mb-2">Work Order Detail</h2>
            <input type="hidden" id="wod-id-internal">
            <div class="space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-400">Target Tree</label>
                        <p id="wod-tree" class="text-lg font-bold"></p>
                    </div>
                    <div class="text-right">
                        <label class="text-xs font-bold uppercase text-gray-400">Status</label>
                        <p id="wod-status" class="font-bold uppercase text-sm"></p>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-gray-400">Task Type</label>
                    <p id="wod-type" class="font-semibold"></p>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-gray-400">Instructions</label>
                    <p id="wod-instructions" class="text-gray-700 bg-gray-50 p-3 rounded-lg border italic"></p>
                </div>
                
                <div id="close-action-area" class="pt-4 border-t border-gray-100">
                    <button id="close-wo-btn" onclick="handleCloseWorkOrder()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold shadow-md hover:bg-red-700">Close Work Order</button>
                    <p id="closed-timestamp" class="text-center text-xs text-gray-400 mt-2 hidden"></p>
                </div>

                <button onclick="showPage('work-order-list')" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold mt-4">Back to List</button>
            </div>
        </section>

        <section id="work-order" class="page bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
            <h2 class="text-xl font-bold mb-4 text-orange-800">New Work Order: <span id="work-tree-id"></span></h2>
            <form id="workForm" class="space-y-4">
                <input type="hidden" id="work-id-internal">
                <div>
                    <label class="block text-sm font-medium">Task Type</label>
                    <select id="task-type" class="w-full p-3 border rounded-lg">
                        <option>Pruning</option><option>Fertilizing</option><option>Irrigation Repair</option><option>Pest Control</option><option>Replace Tree</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Instructions / Findings</label>
                    <textarea id="work-instructions" required class="w-full p-3 border rounded-lg" rows="4"></textarea>
                </div>
                <button type="submit" id="woSubmitBtn" class="w-full bg-orange-600 text-white p-4 rounded-xl font-bold">Submit Work Order</button>
                <button type="button" onclick="showPage('tree-list')" class="w-full text-gray-500 mt-2">Cancel</button>
            </form>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://etqenbfxzyhpcpudmlqo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0cWVuYmZ4enlocGNwdWRtbHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODI3MDAsImV4cCI6MjA4NzE1ODcwMH0.5MR78dPRGKbshbHmY1CuAFpS4FMtGtY44IROA-O609c';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let orchardData = [], workOrders = [], filteredWO = [], map, markers = [];

        const grossInput = document.getElementById('gross_weight');
        const ratioInput = document.getElementById('leaf_ratio');
        const netDisplay = document.getElementById('net_weight_display');

        function calculateNet() {
            const gross = parseFloat(grossInput.value) || 0;
            const ratio = parseFloat(ratioInput.value) || 0;
            const net = gross * (1 - ratio);
            netDisplay.innerText = net.toFixed(2);
        }

        grossInput.addEventListener('input', calculateNet);
        ratioInput.addEventListener('input', calculateNet);

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'map-view' && map) setTimeout(() => map.invalidateSize(), 200);
            window.scrollTo(0,0);
        }

        function getLocalDateInputValue(date = new Date()) {
            const timezoneOffsetMs = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - timezoneOffsetMs).toISOString().split('T')[0];
        }

        async function fetchTrees() {
            const { data, error } = await _supabase.from('trees').select('*').order('tree_id');
            if (error) console.error("Error fetching trees:", error);
            orchardData = data || [];
            renderTrees(orchardData);
            if (map) updateMapMarkers();
        }

        function renderTrees(trees) {
            document.getElementById('treeGrid').innerHTML = trees.map(tree => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 clickable" onclick="viewTreeDetail('${tree.tree_id}')">
                    <h3 class="text-xl font-bold">${tree.tree_id}</h3>
                    <p class="text-xs text-emerald-600 font-bold uppercase mb-4">${tree.field_name || 'No Field'}</p>
                    <button class="w-full bg-gray-50 text-gray-600 py-2 rounded-lg text-sm font-bold">View Actions & Stats</button>
                </div>
            `).join('');
        }

        function filterTrees() {
            const term = document.getElementById('treeSearch').value.toLowerCase();
            const filtered = orchardData.filter(t => 
                t.tree_id.toLowerCase().includes(term) || 
                (t.field_name && t.field_name.toLowerCase().includes(term)) ||
                (t.variety && t.variety.toLowerCase().includes(term))
            );
            renderTrees(filtered);
        }

        async function viewTreeDetail(id) {
            const tree = orchardData.find(t => t.tree_id === id);
            if (!tree) return;
            
            document.getElementById('td-id').innerText = tree.tree_id;
            document.getElementById('td-field').innerText = tree.field_name || 'No Field Assigned';
            document.getElementById('td-variety').innerText = tree.variety || 'N/A';
            
            if (tree.date_of_planting) {
                const years = Math.abs(new Date(Date.now() - new Date(tree.date_of_planting).getTime()).getUTCFullYear() - 1970);
                document.getElementById('td-age').innerText = years + " years";
            } else { 
                document.getElementById('td-age').innerText = "Unknown"; 
            }

            // Fetch Yield History for this tree
            await fetchYieldHistory(id);
            
            showPage('tree-detail');
        }

        async function fetchYieldHistory(treeId) {
            const tableBody = document.getElementById('yield-history-body');
            const avgDisplay = document.getElementById('avg-yield');
            const countDisplay = document.getElementById('total-count');
            
            tableBody.innerHTML = '<tr><td colspan="2" class="p-3 text-center text-xs text-gray-400">Loading history...</td></tr>';

            const { data, error } = await _supabase
                .from('harvest_logs')
                .select('net_nut_weight_kg, harvest_date, created_at')
                .eq('tree_id', treeId)
                .order('harvest_date', { ascending: false });

            if (error || !data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="2" class="p-3 text-center text-xs text-gray-400">No history found.</td></tr>';
                avgDisplay.innerText = "0.00 kg";
                countDisplay.innerText = "0";
                return;
            }

            // Calculations
            let totalWeight = 0;
            const yearGroups = {};

            data.forEach(log => {
                const weight = Number(log.net_nut_weight_kg) || 0;
                const sourceDate = log.harvest_date || log.created_at;
                const year = sourceDate ? new Date(sourceDate).getFullYear() : 'Unknown';

                totalWeight += weight;
                yearGroups[year] = (yearGroups[year] || 0) + weight;
            });

            avgDisplay.innerText = (totalWeight / data.length).toFixed(2) + " kg";
            countDisplay.innerText = data.length;

            // Render Year Rows
            const sortedYears = Object.keys(yearGroups).sort((a, b) => b - a);
            tableBody.innerHTML = sortedYears.map(year => `
                <tr>
                    <td class="px-3 py-2 font-medium text-emerald-900">${year}</td>
                    <td class="px-3 py-2 text-right font-bold text-gray-700">${yearGroups[year].toFixed(2)}</td>
                </tr>
            `).join('');
        }

        function openHarvest(id) { 
            document.getElementById('harvest-tree-id').innerText = id; 
            document.getElementById('harvest-id-internal').value = id;
            
            // Set default date to today using the user's local timezone.
            document.getElementById('harvest_date').value = getLocalDateInputValue();

            showPage('log-harvest'); 
        }

        // --- HARVEST SUBMISSION ---
        document.getElementById('harvestForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('harvestSubmitBtn');
            const treeId = document.getElementById('harvest-id-internal').value;
            const gross = parseFloat(grossInput.value);
            const ratio = parseFloat(ratioInput.value);
            const hDate = document.getElementById('harvest_date').value;
            const netWeight = gross * (1 - ratio);

            if (!hDate) {
                alert('Please choose a harvest date.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Saving...';

            const { error } = await _supabase.from('harvest_logs').insert([{
                tree_id: treeId,
                harvest_date: hDate,
                gross_weight_kg: gross,
                leaf_to_nut_ratio: ratio,
                net_nut_weight_kg: Number(netWeight.toFixed(2)),
                notes: document.getElementById('harvest-notes').value,
                created_at: new Date().toISOString()
            }]);

            if (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Save Harvest";
            } else {
                alert(`Harvest logged for ${treeId}!`);
                e.target.reset();
                netDisplay.innerText = "0.00";
                showPage('tree-list');
                btn.disabled = false;
                btn.innerText = "Save Harvest";
                fetchTrees();
            }
        };

        // --- WORK ORDER SUBMISSION ---
        document.getElementById('workForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('woSubmitBtn');
            const treeId = document.getElementById('work-id-internal').value;
            
            btn.disabled = true;
            btn.innerText = "Submitting...";

            const { error } = await _supabase.from('work_orders').insert([{
                tree_id: treeId,
                task_type: document.getElementById('task-type').value,
                instructions: document.getElementById('work-instructions').value,
                status: 'open',
                created_at: new Date().toISOString()
            }]);

            if (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Submit Work Order";
            } else {
                alert("Work order created!");
                e.target.reset();
                showPage('tree-list');
                btn.disabled = false;
                btn.innerText = "Submit Work Order";
            }
        };

        async function fetchWorkOrders() {
            const { data } = await _supabase.from('work_orders').select('*').order('created_at', { ascending: false });
            workOrders = data || [];
            filteredWO = [...workOrders];
            renderWorkOrders();
        }

        function renderWorkOrders() {
            const tbody = document.getElementById('woTableBody');
            tbody.innerHTML = filteredWO.map(wo => `
                <tr class="border-b clickable" onclick="viewWODetail('${wo.wo_id}')">
                    <td class="p-4 font-bold">${wo.tree_id}</td>
                    <td class="p-4">${wo.task_type}</td>
                    <td class="p-4 text-xs font-semibold ${wo.status === 'closed' ? 'text-gray-400' : 'text-orange-600'}">${wo.status}</td>
                    <td class="p-4 text-xs text-gray-400">${new Date(wo.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function filterWorkOrders() {
            const term = document.getElementById('woSearch').value.toLowerCase();
            filteredWO = workOrders.filter(wo => 
                wo.tree_id.toLowerCase().includes(term) || 
                wo.task_type.toLowerCase().includes(term) || 
                wo.status.toLowerCase().includes(term)
            );
            renderWorkOrders();
        }

        function viewWODetail(woId) {
            const wo = workOrders.find(w => w.wo_id == woId);
            if (!wo) return;
            document.getElementById('wod-id-internal').value = wo.wo_id;
            document.getElementById('wod-tree').innerText = wo.tree_id;
            document.getElementById('wod-type').innerText = wo.task_type;
            document.getElementById('wod-status').innerText = wo.status;
            document.getElementById('wod-instructions').innerText = wo.instructions || "No instructions provided.";
            
            const closeBtn = document.getElementById('close-wo-btn');
            const stamp = document.getElementById('closed-timestamp');
            if (wo.status === 'closed') {
                closeBtn.classList.add('hidden');
                document.getElementById('wod-status').className = "font-bold uppercase text-sm text-gray-400";
                if (wo.closed_at) {
                    stamp.innerText = "Closed on: " + new Date(wo.closed_at).toLocaleString();
                    stamp.classList.remove('hidden');
                }
            } else {
                closeBtn.classList.remove('hidden');
                stamp.classList.add('hidden');
                document.getElementById('wod-status').className = "font-bold uppercase text-sm text-orange-600";
            }
            showPage('wo-detail');
        }

        async function handleCloseWorkOrder() {
            const woId = document.getElementById('wod-id-internal').value;
            if (!confirm("Mark this as CLOSED?")) return;
            const { error } = await _supabase.from('work_orders').update({ status: 'closed', closed_at: new Date().toISOString() }).eq('wo_id', woId);
            if (error) alert("Error: " + error.message);
            else { fetchWorkOrders(); showPage('work-order-list'); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([-27.65, 152.2], 18);
            L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
            updateMapMarkers();
        }

        function updateMapMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = orchardData.filter(t => t.latitude).map(tree => {
                const m = L.marker([tree.latitude, tree.longitude]).addTo(map);
                m.on('click', () => viewTreeDetail(tree.tree_id));
                return m;
            });
        }

        function toggleMapView() {
            const isActive = document.getElementById('map-view').classList.contains('active');
            showPage(isActive ? 'tree-list' : 'map-view');
            document.getElementById('viewToggle').innerText = isActive ? "Map View" : "Grid View";
            if (!isActive) initMap();
        }

        async function updateTreeLocation(treeId) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await _supabase.from('trees').update({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }).eq('tree_id', treeId);
                if (error) alert(error.message);
                else { alert(`GPS updated for ${treeId}`); fetchTrees(); }
            }, (err) => alert(err.message), { enableHighAccuracy: true });
        }

        function openWorkOrder(id) { 
            document.getElementById('work-tree-id').innerText = id; 
            document.getElementById('work-id-internal').value = id; 
            showPage('work-order'); 
        }
        
        fetchTrees();
    </script>
</body>
</html>
